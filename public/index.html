<!DOCTYPE html>
<html lang="ml">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>പഞ്ചാംഗം - Malayalam Panchangam</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="header">
    <h1>പഞ്ചാംഗം</h1>
    <p class="subtitle">Malayalam Panchangam</p>
  </header>
  <div class="ornament-border"></div>

  <section class="date-picker-section">
    <label for="datePicker">തീയതി തിരഞ്ഞെടുക്കുക / Select Date:</label>
    <input type="date" id="datePicker" class="date-input">
    <div class="nav-btns">
      <button class="nav-btn" id="prevDay">◀ ഇന്നലെ</button>
      <button class="nav-btn" id="today">ഇന്ന്</button>
      <button class="nav-btn" id="nextDay">നാളെ ▶</button>
      <button class="nav-btn cal-toggle-btn" id="calToggle">📅 മാസം</button>
      <button class="nav-btn tools-toggle-btn" id="toolsToggle">🔧 ഉപകരണങ്ങൾ</button>
    </div>
  </section>

  <main class="container" id="content">
    <div class="loading">
      <div class="spinner"></div>
      <br>പഞ്ചാംഗം ലോഡ് ചെയ്യുന്നു...
    </div>
  </main>

  <footer class="footer">
    <div>മലയാളം പഞ്ചാംഗം &copy; 2026 | സ്ഥലം: കേരളം (11.07°N, 76.28°E)</div>
    <div class="footer-credits">
      Developed by <strong>Babu Perumana</strong>
      &nbsp;|&nbsp;

      &nbsp;|&nbsp;

    </div>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
